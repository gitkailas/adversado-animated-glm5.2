<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#05060a" />

    <title>Adversado</title>
    <meta
      name="description"
      content="Adversado — digital marketing, in motion."
    />

    <!-- Inline the critical preloader CSS so it paints before the bundle loads. -->
    <style>
      /* Avoid a flash of unstyled hero while CSS loads. */
      html, body { margin: 0; padding: 0; background: #05060a; color: #fff; }
      #app { min-height: 100vh; }
    </style>
  </head>

  <body>
    <!-- ====================================================================
         ROOT
         .hero-scene is pinned (position: sticky) and is the full-bleed canvas
         wrapper. .hero-spacer gives the page enough scroll runway to scrub
         through all 300 frames. No text overlay — the animation is the hero.
    ===================================================================== -->
    <main id="app">
      <section class="hero-scene" aria-label="Adversado hero">
        <!-- The canvas that renders the 300-frame sequence. -->
        <canvas
          id="hero-canvas"
          class="hero-canvas"
          aria-hidden="true"
        ></canvas>

        <!-- ================================================================
             PRELOADER  (text-free)
             A full-page black overlay containing only a slim progress bar.
             No brand mark, no counter, no caption — the animation itself
             is the reveal. Bar fill width is driven by JS via inline style;
             once loading completes the entire overlay fades out.
        ================================================================ -->
        <div id="preloader" class="preloader" data-state="loading">
          <div class="preloader__bar">
            <div class="preloader__bar-fill" id="preloader-bar-fill"></div>
          </div>
        </div>
      </section>

      <!-- Empty parchment after the hero so the page can scroll past it.
           In a real site this is where the next section lives. -->
      <section class="hero-spacer" aria-hidden="true"></section>
    </main>

    <script type="module" src="/src/scripts/main.js"></script>
  </body>
</html>
